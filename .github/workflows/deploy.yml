name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          docker build -t valorant-backend .
          docker tag valorant-backend:latest 237108087153.dkr.ecr.ca-central-1.amazonaws.com/valorant-backend:latest
          docker push 237108087153.dkr.ecr.ca-central-1.amazonaws.com/valorant-backend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster valorant-cluster --service valorant-backend-service --force-new-deployment --region ca-central-1
          